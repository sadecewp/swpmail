<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{post_title}}</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #f4f4f4;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }
      .wrapper {
        max-width: 600px;
        margin: 0 auto;
        background: #fff;
      }
      .header {
        padding: 24px 32px;
        background: #0073aa;
        text-align: center;
      }
      .header h1 {
        color: #fff;
        font-size: 20px;
        margin: 8px 0 0;
      }
      .content {
        padding: 32px;
        line-height: 1.6;
        color: #333;
        font-size: 15px;
      }
      .post-thumbnail {
        width: 100%;
        max-height: 300px;
        object-fit: cover;
        border-radius: 6px;
        margin-bottom: 16px;
      }
      .post-title {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a1a;
        margin: 0 0 8px;
      }
      .post-meta {
        font-size: 13px;
        color: #888;
        margin-bottom: 16px;
      }
      .post-excerpt {
        margin-bottom: 24px;
      }
      .btn {
        display: inline-block;
        padding: 12px 28px;
        background: #0073aa;
        color: #fff;
        text-decoration: none;
        border-radius: 4px;
        font-weight: 600;
      }
      .footer {
        padding: 20px 32px;
        background: #f9f9f9;
        text-align: center;
        font-size: 12px;
        color: #999;
        border-top: 1px solid #eee;
      }
      .footer a {
        color: #0073aa;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <table
      width="100%"
      cellpadding="0"
      cellspacing="0"
      role="presentation"
      style="background: #f4f4f4"
    >
      <tr>
        <td align="center" style="padding: 24px 0">
          <table
            class="wrapper"
            width="600"
            cellpadding="0"
            cellspacing="0"
            role="presentation"
          >
            <tr>
              <td class="header"><h1>{{site_name}}</h1></td>
            </tr>
            <tr>
              <td class="content">
                {{post_thumbnail}}
                <h2 class="post-title">{{post_title}}</h2>
                <p class="post-meta">von {{author_name}}</p>
                <div class="post-excerpt">{{post_excerpt}}</div>
                <p><a href="{{post_url}}" class="btn">Weiterlesen &rarr;</a></p>
              </td>
            </tr>
            <tr>
              <td class="footer">
                <p>
                  &copy; {{year}} {{site_name}} &middot;
                  <a href="{{site_url}}">{{visit_site_text}}</a>
                </p>
                <p><a href="{{unsubscribe_url}}">{{unsubscribe_text}}</a></p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
