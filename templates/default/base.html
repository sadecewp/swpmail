<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{site_name}}</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #f4f4f4;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }
      .wrapper {
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
      }
      .header {
        padding: 24px 32px;
        background: #0073aa;
        text-align: center;
      }
      .header img {
        max-height: 50px;
      }
      .header h1 {
        color: #ffffff;
        font-size: 22px;
        margin: 8px 0 0;
      }
      .content {
        padding: 32px;
        line-height: 1.6;
        color: #333;
        font-size: 15px;
      }
      .footer {
        padding: 20px 32px;
        background: #f9f9f9;
        text-align: center;
        font-size: 12px;
        color: #999;
        border-top: 1px solid #eee;
      }
      .footer a {
        color: #0073aa;
        text-decoration: none;
      }
      .btn {
        display: inline-block;
        padding: 12px 24px;
        background: #0073aa;
        color: #ffffff;
        text-decoration: none;
        border-radius: 4px;
        font-weight: 600;
      }
      @media (max-width: 620px) {
        .wrapper {
          width: 100% !important;
        }
        .content,
        .header,
        .footer {
          padding: 16px !important;
        }
      }
    </style>
  </head>
  <body>
    <table
      width="100%"
      cellpadding="0"
      cellspacing="0"
      role="presentation"
      style="background: #f4f4f4"
    >
      <tr>
        <td align="center" style="padding: 24px 0">
          <table
            class="wrapper"
            width="600"
            cellpadding="0"
            cellspacing="0"
            role="presentation"
          >
            <tr>
              <td class="header">
                {{site_logo}}
                <h1>{{site_name}}</h1>
              </td>
            </tr>
            <tr>
              <td class="content">{{content}}</td>
            </tr>
            <tr>
              <td class="footer">
                <p>
                  &copy; {{year}} {{site_name}} &middot;
                  <a href="{{site_url}}">{{visit_site_text}}</a>
                </p>
                <p>
                  <a href="{{unsubscribe_url}}">{{unsubscribe_text}}</a> |
                  <a href="{{privacy_url}}">Privacy Policy</a>
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
