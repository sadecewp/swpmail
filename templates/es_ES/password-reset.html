<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restablecer contraseña - {{site_name}}</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #f4f4f4;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }
      .wrapper {
        max-width: 600px;
        margin: 0 auto;
        background: #fff;
      }
      .header {
        padding: 24px 32px;
        background: #0073aa;
        text-align: center;
      }
      .header h1 {
        color: #fff;
        font-size: 20px;
        margin: 8px 0 0;
      }
      .content {
        padding: 32px;
        line-height: 1.6;
        color: #333;
        font-size: 15px;
      }
      .btn {
        display: inline-block;
        padding: 12px 28px;
        background: #0073aa;
        color: #fff;
        text-decoration: none;
        border-radius: 4px;
        font-weight: 600;
      }
      .footer {
        padding: 20px 32px;
        background: #f9f9f9;
        text-align: center;
        font-size: 12px;
        color: #999;
        border-top: 1px solid #eee;
      }
      .footer a {
        color: #0073aa;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <table
      width="100%"
      cellpadding="0"
      cellspacing="0"
      role="presentation"
      style="background: #f4f4f4"
    >
      <tr>
        <td align="center" style="padding: 24px 0">
          <table
            class="wrapper"
            width="600"
            cellpadding="0"
            cellspacing="0"
            role="presentation"
          >
            <tr>
              <td class="header"><h1>{{site_name}}</h1></td>
            </tr>
            <tr>
              <td class="content">
                <h2>Solicitud de restablecimiento de contraseña</h2>
                <p>
                  Hola {{username}}, se ha solicitado un restablecimiento de
                  contraseña para tu cuenta en <strong>{{site_name}}</strong>.
                </p>
                <p>Si no lo solicitaste, puedes ignorar este correo.</p>
                <p>
                  <a href="{{reset_link}}" class="btn"
                    >Restablecer contraseña</a
                  >
                </p>
              </td>
            </tr>
            <tr>
              <td class="footer"><p>&copy; {{year}} {{site_name}}</p></td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
